<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
</head>
<body>
    <h1>🎶 Your Stems</h1>

    {% for file in files %}

    <div>
        <p>{{ file }}</p>
        <audio controls>
            <source src="{{ url_for('static', filename='stems/' + folder + '/' + file) }}" type="audio/mp3">
            Your browser does not support audio
        </audio>
    </div>
   
    {% endfor %}

    <a href="/">
        <button>Upload Another Song</button>
    </a>

</body>
</html>
