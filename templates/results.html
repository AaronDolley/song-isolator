<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
</head>
<body>
    <h1>🎶 Your Stems</h1>

    <button onclick="togglePlay()">Play / Pause All</button>

    {% for file in files %}
    <div class="stem" data-url="{{ url_for('static', filename='stems/' + folder + '/' + file) }}">

        <p>{{ file }}</p>

        <div class="waveform"></div>

        <button class="toggleMute({{ loop.index0 }}, this)">Mute</button>

    </div>
    {% endfor %}

    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
