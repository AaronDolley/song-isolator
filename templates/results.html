<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
</head>
<body>
    <h1>🎶 Your Stems</h1>

    <button onclick="togglePlay()">Play / Pause All</button>

    {% for file in files %}

    <div>
        <p>{{ file }}</p>
        <audio class="stem-audio" preload="audio" controls>
            <source src="{{ url_for('static', filename='stems/' + folder + '/' + file) }}" type="audio/mp3">
            Your browser does not support audio
        </audio>

        <button onclick="toggleMute(this)">Mute</button>
    </div>
   
    {% endfor %}

    <a href="/">
        <button>Upload Another Song</button>
    </a>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
